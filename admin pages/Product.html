<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <link rel="stylesheet" href="Product.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
        <div class="Header">
        <div class="logo">
            TS
        </div>
        <div class="Title">
            <h1>TechStore</h1>
        </div>
    </div>
    <div class="Body">
    <div class="Sidebare">
        <a href="#">Dashboard</a>
        <a href="#">Product</a>
        <a href="#">Order</a>
        <a href="#">Users</a>
        <a href="#">Profile</a>
    </div>
    <div class="Separate">
        <div class="Title">
            <h1>Product</h1>
            <button>+ Add Product</button>
        </div>
        <div class="Search-filter">
            <input type="text" placeholder="Search products...">
            <select name="Filter" id="Select">
                <option value="" disabled selected hidden>Select a category</option>
                <option value="Phone">Phone</option>
                <option value="Laptop">Laptop</option>
                <option value="Watch">Watch</option>
                <option value="Headphones">Headphones</option>
            </select>
        </div>
        <div class="table-order">
          <table>
            <thead>
                <tr>
                    <th>Product ID</th>
                    <th>Product name</th>
                    <th>Quantity</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
               <tr>
                <td>1023</td>
                <td>Iphone 15 pro max</td>
                <td>2</td>
                <td>Phone</td>
                <td>$500</td>
                <td>
                 <button class="show-btn"><i data-lucide="eye"></i></button>
                 <button class="modify-btn"><i data-lucide="pencil"></i></button>
                 <button class="delete-btn"><i data-lucide="trash2"></i></button>
                </td>
               </tr>
                <tr>
                <td>1024</td>
                <td>Lenove thinkpad</td>
                <td>4</td>
                <td>Laptop</td>
                <td>$300</td>
                <td>
                 <button class="show-btn"><i data-lucide="eye"></i></button>
                 <button class="modify-btn"><i data-lucide="pencil"></i></button>
                 <button class="delete-btn"><i data-lucide="trash2"></i></button>
                </td>
               </tr>
            </tbody>
         </table>
         </div>
    </div>
     <script>
  lucide.createIcons();
</script>
</body>
</html>
