<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="ShowOrder.css">
</head>
<body>
<div class="Body">
    <div class="header">
        <a href="Order.html" class="back"><i data-lucide="arrow-left"></i> Back</a>
        <h1>Order Details</h1>
    </div>
    <div class="card">
        <h2>Order #1023</h2>
        <p><strong>Date:</strong> 2026-03-25</p>
        <p><strong>Status:</strong> <span class="status pending">Pending</span></p>
        <p><strong>Total:</strong> $120</p>
    </div>
    <div class="card">
        <h2>Customer Information</h2>
        <p><strong>Name:</strong> Djalel Brik</p>
        <p><strong>Email:</strong> djalel@email.com</p>
        <p><strong>Phone:</strong> +213 555 00 00 00</p>
        <p><strong>Address:</strong> Algiers, Algeria</p>
    </div>
    <div class="card">
        <h2>Products</h2>
        <div class="product">
            <img src="../s23 ultra.jpg" alt="">
            <div>
                <h3>Wireless Headphones</h3>
                <p>Qty: 1</p>
                <p>Price: $80</p>
            </div>
        </div>
        <div class="product">
            <img src="../s23 ultra.jpg" alt="">
            <div>
                <h3>Smart Watch</h3>
                <p>Qty: 1</p>
                <p>Price: $40</p>
            </div>
        </div>
    </div>
    <div class="actions">
        <button class="confirm">Change Status</button>
        <button class="cancel">Cancel Order</button>
    </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
