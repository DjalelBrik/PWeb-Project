<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="ShowOrder.css">
</head>
<body>
<div class="Body">
    <div class="header">
        <a href="Order.html" class="back"><i data-lucide="arrow-left"></i> Back</a>
        <h1>Order Details</h1>
    </div>
    <div class="card">
        <h2 id="orderTitle">Order #</h2>
        <p><strong>Date:</strong> <span id="orderDate"></span></p>
        <p><strong>Status:</strong> <span id="orderStatus" class="status"></span></p>
        <p><strong>Total:</strong> $<span id="orderTotal"></span></p>
    </div>
    <div class="card">
        <h2>Customer Information</h2>
        <p><strong>Name:</strong> <span id="customerName"></span></p>
        <p><strong>Email:</strong> <span id="customerEmail"></span></p>
        <p><strong>Phone:</strong> <span id="customerPhone"></span></p>
        <p><strong>Address:</strong> <span id="customerAddress"></span></p>
    </div>
    <div class="card">
        <h2>Products</h2>
        <div id="productsContainer"></div>
    </div>
    <div class="actions">
        <button class="confirm">Change Status</button>
    </div>
</div>
<script type="module" src="./logic/Order/ShowOrder.js"></script>
<script type="module" src="./logic/Order/ChangeStatus.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
