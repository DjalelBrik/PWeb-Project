<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <link rel="stylesheet" href="Order.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
        <div class="Header">
        <div class="logo">
            TS
        </div>
        <div class="Title">
            <h1>TechStore</h1>
        </div>
    </div>
    <div class="Body">
    <div class="Sidebare">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/Product">Product</a>
        <a href="/admin/Order" class="active">Order</a>
        <a href="/admin/User">Users</a>
        <a href="/admin/Profile">Profile</a>
    </div>
    <div class="Separate">
        <div class="Title">
            <h1>Orders</h1>
            <div class="button">
            <select id="Select" class="Select">
                <option disabled selected hidden>Filtred</option>
                <option value="Delivered">Delivered</option>
                <option value="Pending">Pending</option>
                <option value="Shipped">Shipped</option>
                <option value="Cancelled">Cancelled</option>
            </select>
            <button>Export Report</button>
            </div>
        </div>
        <div class="table-order">
          <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Product Name</th>
                    <th>Quantity</th>
                    <th>Total Price</th>
                    <th>Status</th>
                    <th>date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table">
            </tbody>
         </table>
         </div>
    </div>
    <script type="module" src="./logic/Order/DisplayOrder.js"></script>
    <script type="module" src="./logic/Order/FilterOrder.js"></script>


     <script>
  lucide.createIcons();
</script>
</body>
</html>
