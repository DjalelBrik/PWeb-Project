<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <link rel="stylesheet" href="AddProduct.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="Body">
    <div class="header">
        <span class="back"><a href="/admin/Product"><i data-lucide="arrow-left"></i></a></span>
        <h2>Add Product</h2>
    </div>
    <div class="title">
        <p class="subtitle">INVENTORY MANAGEMENT</p>
        <h1>Create New Listing</h1>
        <p class="description">
            Fill in the essential details to showcase your product in the TechStore ecosystem.
        </p>
    </div>
    <div class="upload">
        <p class="Title">PRODUCT MEDIA</p>
        <div class="boxUpload">
            <div class="content">
                <div class="icon"><i data-lucide="cloud"></i></div>
                <p>Tap to upload primary image</p>
                <input type="file" id="img">
            </div>
        </div>
    </div>
    <div class="form">
        <div class="form-row">
            <div class="input">
                <label>PRODUCT ID</label>
                <input id="productId" type="number" placeholder="e.g. 1025">
            </div>
            <div class="input">
                <label>PRODUCT NAME</label>
                <input id="title" type="text" placeholder="e.g. NovaBeam X1 Projector">
            </div>
        </div>
        <div class="form-row">
            <div class="input">
                <label>QUANTITY</label>
                <input id="quantity" type="number" min="0" placeholder="e.g. 12">
            </div>
            <div class="input">
                <label>CATEGORY</label>
                <select id="category">
                    <option value="" disabled selected hidden>Select Category</option>
                    <option value="Phone">Phone</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Watch">Watch</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        <div class="input">
            <label>PRICE</label>
            <input id="price" type="number" min="0" step="0.01" placeholder="e.g. 499.99">
        </div>
        <div class="input">
            <label>DESCRIPTION</label>
            <textarea id="description" placeholder="Describe the key features and specifications..."></textarea>
        </div>
    </div>
    <div class="footer">
        <button class="save-btn"><i data-lucide="save"></i> Save Product</button>
    </div>
</div>
<script type="module" src="./logic/Product/AddProduct.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
