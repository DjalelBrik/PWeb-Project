<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
        <link rel="stylesheet" href="User.css">
        <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
      <div class="Header">
        <div class="logo">
            TS
        </div>
        <div class="Title">
            <h1>TechStore</h1>
        </div>
    </div>
    <div class="Body">
    <div class="Sidebare">
        <a href="dashboard.html">Dashboard</a>
        <a href="Product.html">Product</a>
        <a href="Order.html">Order</a>
        <a href="#" class="active">Users</a>
        <a href="Profile.html">Profile</a>
    </div>
    <div class="Separate">
    <div class="Boxes">
    <div class="Box">
        <div class="icon">
           <i data-lucide="users"></i>
        </div>
        <p>Total Users</p>
        <p>2.8k</p>
    </div> 
    <div class="Box">
        <div class="icon">
           <i data-lucide="unlock-keyhole"></i>
        </div>
        <p>Active Accounts</p>
        <p>678</p>
    </div> 
    <div class="Box">
        <div class="icon">
            <i data-lucide="lock-keyhole"></i>
        </div>
        <p>Blocked</p>
        <p>12</p>
    </div>
    </div>
    <div class="Search-filter">
            <input id="Search" type="text" placeholder="Search users...">
            <select id="Select" name="Filter" id="Select">
                <option value="" disabled selected hidden>Select a category</option>
                <option value="Blocked">Blocked</option>
                <option value="Active">Active</option>
               <option value="Inactive">Inactive</option>
            </select>
        </div>
    <div class="table-order">
         <table>
  <thead>
    <tr>
      <th>User ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Role</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="table">
  </tbody>
</table>
    </div>
    </div>
    </div>
        <script type="module" src="./logic/User/DisplayUser.js"></script>
        <script type="module" src="./logic/User/Filter.js"></script>
        <script type="module" src="./logic/User/Search.js"></script>



    <script>
  lucide.createIcons();
</script>
</body>
</html>
