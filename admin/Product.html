<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <link rel="stylesheet" href="Product.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
        <div class="Header">
        <div class="logo">
            TS
        </div>
        <div class="Title">
            <h1>TechStore</h1>
        </div>
    </div>
    <div class="Body">
    <div class="Sidebare">
        <a href="dashboard.html">Dashboard</a>
        <a href="#">Product</a>
        <a href="Order.html">Order</a>
        <a href="User.html">Users</a>
        <a href="Profile.html">Profile</a>
    </div>
    <div class="Separate">
        <div class="Title">
            <h1>Product</h1>
            <a href="AddProduct.html"><button>+ Add Product</button></a>
        </div>
        <div class="Search-filter">
            <input id="search" type="text" placeholder="Search products...">
            <select name="Filter" id="Select">
                <option value="" disabled selected hidden>Select a category</option>
                <option value="Phone">Phone</option>
                <option value="Laptop">Laptop</option>
                <option value="Watch">Watch</option>
                <option value="Headphones">Headphones</option>
            </select>
        </div>
        <div class="table-order">
          <table>
            <thead>
                <tr>
                    <th>Product ID</th>
                    <th>Image</th>
                    <th>Product name</th>
                    <th>Quantity</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="productTable">
            </tbody>
         </table>
         </div>
    </div>
    <script type="module" src="./logic/Product/Search.js"></script>
        <script type="module" src="./logic/Product/DisplayTable.js"></script>
 <script type="module" src="./logic/Product/FiltreProduct.js"></script>
     <script>
  lucide.createIcons();
</script>
</body>
</html>
