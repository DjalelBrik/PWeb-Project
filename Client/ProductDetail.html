<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="ProductDetail.css">
</head>
<body>
    <div class="Product-Detail">

    <div class="product-image">
        <span class="badge">NEW ARRIVAL</span>
        <img src="../s23 ultra.jpg" alt="product">
    </div>
    <div class="thumbnails">
        <img src="../s23 ultra.jpg" class="active">
        <img src="../s23 ultra.jpg">
        <img src="../s23 ultra.jpg">
    </div>
    <h1 class="product-title">NovaPro 15 Ultra</h1>
    <div class="price">
        <span class="new-price">$1,199.00</span>
        <span class="old-price">$1,349.00</span>
    </div>
    <div class="stock">
        ● IN STOCK
    </div>
    <div class="finish">
        <p>Select Finish</p>
        <div class="colors">
            <span class="color active"></span>
            <span class="color blue"></span>
            <span class="color gray"></span>
        </div>
    </div>
    <div class="storage">
        <p>Storage Capacity</p>
        <div class="storage-options">
            <button class="active">128GB</button>
            <button>256GB</button>
        </div>
    </div>
    <button id="add" class="add-cart">
        <i data-lucide="shopping-cart"></i>
        Add to Cart
    </button>
<script>
    lucide.createIcons();
</script>
<script type="module" src="./logic/AddtoCartDetail.js"></script>
</div>
</body>
</html>
