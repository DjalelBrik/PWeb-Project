<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="ShoppingCart.css">
</head>
<body>
    <div class="Body">
     <a href="Products.html" class="back"><span ><i data-lucide="arrow-left"></i></span></a>

    <div class="header">
        <h1>Your Cart</h1>
        <p>You have <span>0 items</span> ready for checkout.</p>
    </div>
    <div class="container">
        <div class="items"></div>
        <div class="Leftside">
            <h2>Order Summary</h2>
            <div class="row">
                <span>Subtotal (0 items)</span>
                <span>$0.00</span>
            </div>
            <div class="row">
                <span>Shipping</span>
                <span class="link">Calculated at next step</span>
            </div>
            <div class="row">
                <span>Tax</span>
                <span>$0.00</span>
            </div>
            <hr>
            <div class="total">
                <span>Total</span>
                <span>$0.00</span>
            </div>
           <a href="Checkout.html" style="text-decoration: none;">
            <button class="checkout-btn">
                Proceed to Checkout
                <i data-lucide="arrow-right"></i>
            </button>
            </a>
        </div>
    </div>
</div>
<script>
    lucide.createIcons();
</script>
<script type="module" src="./logic/Display_Delete_Cart.js"></script>
</body>
</html>
